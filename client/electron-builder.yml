appId: com.kaerna.launcher
productName: Kaerna Launcher
directories:
  output: release
  buildResources: build
files:
  - out/**/*
  - package.json
extraMetadata:
  main: out/main/index.js
asar: true
npmRebuild: false
win:
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: Kaerna-Launcher-${version}-${target}.${ext}
  executableName: KaernaLauncher
  signAndEditExecutable: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Kaerna Launcher
portable:
  artifactName: Kaerna-Launcher-${version}-portable.${ext}
